<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kanban Task Management</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./styles.css" />

    <!-- App favicon -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/favicon.svg"
    />

    <!-- Main JavaScript file -->
    <script defer src="./scripts/main.js" type="module"></script>
  </head>

  <body class="light-theme">
    <!-- Main app container -->
    <div class="app-shell">

      <!-- Sidebar -->
      <aside class="side-bar" id="side-bar-div">
        <div class="sidebar-top">

          <!-- Logo section -->
          <div id="side-logo-div">
            <img
              id="logo"
              src="./assets/logo-light.svg"
              alt="Kanban logo"
            />
          </div>

          <!-- Board navigation -->
          <div class="boards-nav-links-div" id="boards-nav-links-div">
            <h4 id="headline-sidepanel">ALL BOARDS (1)</h4>

            <!-- Active board -->
            <button class="board-btn active-board" type="button">
              Launch Career
            </button>
          </div>
        </div>

        <div class="sidebar-bottom">

          <!-- Theme toggle (light/dark mode) -->
          <div class="theme-toggle-box">
            <span class="theme-icon" aria-hidden="true">☀️</span>

            <label class="theme-switch" for="theme-toggle">
              <span class="sr-only">Toggle dark mode</span>
              <input type="checkbox" id="theme-toggle" />
              <span class="theme-slider"></span>
            </label>

            <span class="theme-icon" aria-hidden="true">🌙</span>
          </div>

          <!-- Hide sidebar button -->
          <button
            class="hide-sidebar-btn"
            id="hide-sidebar-btn"
            type="button"
          >
            <span class="hide-icon" aria-hidden="true">🚫</span>
            <span>Hide Sidebar</span>
          </button>
        </div>
      </aside>

      <!-- Button to show sidebar -->
      <button
        class="show-sidebar-btn"
        id="show-sidebar-btn"
        type="button"
        aria-label="Show sidebar"
      >
        👀
      </button>

      <div id="layout">

        <!-- Header -->
        <header id="header" class="sticky-header">
          <div class="header-name-div">

            <!-- Mobile menu trigger -->
            <button
              class="mobile-menu-trigger"
              id="mobile-menu-trigger"
              type="button"
              aria-label="Open mobile menu"
            >
              <img
                src="./assets/favicon.svg"
                alt=""
                class="logo-mobile"
              />
            </button>

            <!-- Board title -->
            <h2 class="header-board-name" id="header-board-name">
              Launch Career
            </h2>
          </div>

          <!-- Add new task button -->
          <button id="add-new-task-btn" class="primary-btn" type="button">
            + Add New Task
          </button>
        </header>

        <div class="container">
          <main class="card-column-main">

            <!-- TODO COLUMN -->
            <section class="column-div" data-status="todo">
              <div class="column-head-div">
                <span class="dot todo-dot"></span>
                <h4 class="columnHeader">TODO (0)</h4>
              </div>

              <!-- Tasks will be rendered here -->
              <div class="tasks-container"></div>
            </section>

            <!-- DOING COLUMN -->
            <section class="column-div" data-status="doing">
              <div class="column-head-div">
                <span class="dot doing-dot"></span>
                <h4 class="columnHeader">DOING (0)</h4>
              </div>

              <div class="tasks-container"></div>
            </section>

            <!-- DONE COLUMN -->
            <section class="column-div" data-status="done">
              <div class="column-head-div">
                <span class="dot done-dot"></span>
                <h4 class="columnHeader">DONE (0)</h4>
              </div>

              <div class="tasks-container"></div>
            </section>

          </main>
        </div>
      </div>
    </div>

    <!-- Mobile menu dialog -->
    <dialog class="mobile-menu" id="mobile-menu">
      <div class="mobile-menu-card">
        <div class="mobile-menu-header">
          <h4>ALL BOARDS (1)</h4>

          <!-- Close mobile menu -->
          <button
            class="close-btn small-close-btn"
            id="close-mobile-menu"
            type="button"
            aria-label="Close mobile menu"
          >
            &times;
          </button>
        </div>

        <!-- Board button -->
        <button class="board-btn active-board mobile-board-btn" type="button">
          Launch Career
        </button>

        <!-- Mobile theme toggle -->
        <div class="theme-toggle-box mobile-theme-box">
          <span class="theme-icon" aria-hidden="true">☀️</span>

          <label class="theme-switch" for="mobile-theme-toggle">
            <span class="sr-only">Toggle dark mode on mobile</span>
            <input type="checkbox" id="mobile-theme-toggle" />
            <span class="theme-slider"></span>
          </label>

          <span class="theme-icon" aria-hidden="true">🌙</span>
        </div>
      </div>
    </dialog>

    <!-- Task edit modal -->
    <dialog id="task-modal">
      <form method="dialog" id="task-form" class="edit-task-form">

        <!-- Modal header -->
        <div class="modal-header">
          <h3>Task</h3>

          <!-- Close modal -->
          <button
            type="button"
            class="close-btn"
            id="close-modal-btn"
            aria-label="Close task modal"
          >
            &times;
          </button>
        </div>

        <!-- Task inputs -->
        <label for="task-title">Title</label>
        <input type="text" id="task-title" name="title" required />

        <label for="task-desc">Description</label>
        <textarea
          id="task-desc"
          name="description"
          rows="5"
          placeholder="Task description"
        ></textarea>

        <label for="task-status">Status</label>
        <select id="task-status" name="status" required>
          <option value="todo">todo</option>
          <option value="doing">doing</option>
          <option value="done">done</option>
        </select>

        <label for="task-priority">Priority</label>
        <select id="task-priority" name="priority" required>
          <option value="low">low</option>
          <option value="medium">medium</option>
          <option value="high">high</option>
        </select>

        <!-- Action buttons -->
        <div class="modal-actions two-buttons">
          <button type="submit" class="submit-btn">Save Changes</button>
          <button
            type="button"
            class="delete-btn"
            id="delete-task-btn"
          >
            Delete Task
          </button>
        </div>
      </form>
    </dialog>

    <!-- Add new task modal -->
    <dialog class="modal-overlay" id="new-task-dialog">
      <form class="modal-window" id="new-task-modal-window">

        <!-- Modal header -->
        <div class="modal-header">
          <h3 class="modal-title">Add New Task</h3>

          <!-- Close modal -->
          <button
            type="button"
            class="close-btn"
            id="cancel-add-btn"
            aria-label="Close add task modal"
          >
            &times;
          </button>
        </div>

        <!-- Input fields -->
        <div class="input-div">
          <label class="label-modal-window" for="title-input">Title</label>
          <input
            type="text"
            class="modal-input"
            id="title-input"
            placeholder="e.g. Take chilled break"
            required
          />
        </div>

        <div class="input-div">
          <label class="label-modal-window" for="desc-input">
            Description
          </label>
          <textarea
            name="description"
            id="desc-input"
            placeholder="e.g. Take a breather and come back refreshed"
            required
          ></textarea>
        </div>

        <!-- Status and priority -->
        <div class="input-div">
          <label class="label-modal-window" for="select-status">Status</label>
          <select name="status" id="select-status" required>
            <option value="todo">todo</option>
            <option value="doing">doing</option>
            <option value="done">done</option>
          </select>
        </div>

        <div class="input-div">
          <label class="label-modal-window" for="select-priority">
            Priority
          </label>
          <select name="priority" id="select-priority" required>
            <option value="low">low</option>
            <option value="medium" selected>medium</option>
            <option value="high">high</option>
          </select>
        </div>

        <!-- Submit button -->
        <div class="button-group">
          <input
            type="submit"
            class="submit-btn"
            id="create-task-btn"
            value="Create Task"
          />
        </div>
      </form>
    </dialog>
  </body>
</html>
